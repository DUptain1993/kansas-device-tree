name: Build OrangeFox recovery (kansas)

# Uses OrangeFox's own orangefox_sync.sh (gitlab.com/OrangeFox/sync) to
# fetch and patch the fox_14.1 build system, rather than a hand-rolled
# `repo init`. fox_14.1 is the newest actively-maintained OrangeFox
# branch (core recovery source last touched ~1 month ago at the time
# this was written) and is the one that carries the AIDL Weaver /
# wrappedkey vold patches relevant to this device's FBE setup. It is
# still labelled EXPERIMENTAL upstream — expect friction.

on:
  workflow_dispatch:
    inputs:
      fox_branch:
        description: "OrangeFox manifest branch passed to orangefox_sync.sh --branch"
        default: "14.1"
        required: false
      build_target:
        description: "Make target. A vendor_boot detour (runs 24-29) matched vendor_boot's AVB signing/header/DTB to the live device exactly and it still failed to flash on real hardware ('Preflash validation failed' on every attempt, and no known community guide for this device flashes a custom vendor_boot either) — reverted back to recovery-as-boot, which has always flashed without that rejection. bootimage is correct here again, NOT vendorbootimage."
        default: "bootimage"
        required: false
  push:
    branches: [ "main" ]
    paths:
      - "device/motorola/kansas/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      # Sixth CI attempt was killed here ("Got signal: terminated" right
      # after Soong finished bootstrapping, no explicit error logged) —
      # a stock ubuntu-22.04 runner has ~14GB free on /, and OrangeFox's
      # own sync README says it can use 40-80GB.
      #
      # Seventh attempt (easimon/maximize-build-space, build-mount-path:
      # /home/runner) failed immediately: /home/runner is a PARENT of
      # the live Actions runner's own working directory
      # (.../work/_temp), so remounting over it breaks the runner
      # process itself.
      #
      # Eighth attempt (same action, build-mount-path:
      # /home/runner/fox_14.1) avoided that, but the resulting LVM
      # volume over a loop-device file was drastically slower for
      # `repo sync`'s many-small-file access pattern than plain disk —
      # the identical sync step took 10 minutes in an earlier run with
      # no LVM layer, and was still not done after 55+ minutes here, so
      # it was cancelled.
      #
      # GitHub-hosted runners already carry a large secondary disk
      # natively mounted at /mnt (no LVM/loop-device abstraction
      # needed) — building directly there sidesteps both problems:
      # plenty of space, and no filesystem-indirection I/O penalty.
      - name: Relocate build directory to the larger /mnt disk
        run: |
          sudo mkdir -p /mnt/fox_14.1
          sudo chown "$(id -u):$(id -g)" /mnt/fox_14.1
          ln -s /mnt/fox_14.1 "$HOME/fox_14.1"
          df -h / /mnt

      - name: Free up root filesystem space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      # Run 11's log, read closely, orders the kill as: the runner process
      # itself gets "Got signal: terminated" from OUTSIDE first, THEN its
      # own cleanup ("Still alive, killing subprocesses...") is what SIGKILLs
      # soong_build - not a plain kernel OOM-killer hitting soong_build
      # directly. That ordering, plus the ~24 minutes run 11 then spent
      # stuck reporting "in progress" before GitHub's backend finally
      # concluded it as cancelled, is the signature of systemd-oomd (enabled
      # by default on ubuntu-22.04 images) killing the runner's cgroup slice
      # under memory pressure and the VM struggling to unwind while still
      # under that same pressure. The swap step below helps by lowering
      # pressure, but disabling the watchdog directly is the standard fix
      # for this exact GitHub Actions failure mode.
      - name: Disable systemd-oomd
        run: sudo systemctl mask --now systemd-oomd.service systemd-oomd.socket

      # The previous "reserve a CPU core + heartbeat" mitigation didn't
      # help: run 11's heartbeat kept printing every 60s right up to the
      # kill, so the runner agent wasn't starved of CPU. The real signature
      # was "soong bootstrap failed with: signal: killed" (SIGKILL) landing
      # ~2.5-3 minutes after soong_build itself started running (the "cp
      # .../soong_build" line), both times, at the point Soong analyzes the
      # entire Android.bp graph for the whole synced tree - the single most
      # memory-hungry moment in the build. That's the OOM killer, not a
      # timeout or a cancellation. /mnt turned out to be the same 146G
      # filesystem as / on this runner image (not a separate disk as the
      # step name above assumes) - confirmed via the "Relocate..." step's
      # own df -h output (146G total, 89G avail at job start). That df
      # output is exactly why run 14's "grow swap to 40G" was wrong: it
      # treated disk as idle and RAM as the only scarce resource, but a
      # 40G swapfile plus the 40-80G OrangeFox tree plus ccache easily
      # exceeds the 89G actually available on this single shared disk.
      # Run 14 died in 10 minutes with an unhandled
      # "IOException: No space left on device" crashing the runner's own
      # log writer - a disk-full crash, not an OOM kill signature (no
      # "Got signal: terminated" / "signal: killed" this time) - and it
      # died faster than run 13 (24G swap) specifically because it had
      # 16G less disk headroom to burn through first. Keep swap modest
      # (12G is ample for a single Soong analysis pass / a 2-job compile,
      # per runs 12-13 which got well into the build with 24G) and print
      # df -h at each disk-relevant checkpoint below instead of guessing
      # from crash signatures alone.
      - name: Add swap space to absorb build memory spikes
        run: |
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
          df -h / /mnt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git git-lfs gnupg flex bison build-essential zip curl patch \
            zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
            bc kmod cpio ccache

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false

      - name: Checkout device tree (this repo)
        uses: actions/checkout@v4
        with:
          path: device-tree-src
          fetch-depth: 1

      - name: Verify prebuilt kernel blob is present
        run: |
          # BoardConfig.mk is set to Mode A (TARGET_PREBUILT_KERNEL), so no
          # kernel source checkout/build happens here — the tree must carry
          # device/motorola/kansas/prebuilt/Image.lz4 (and dtbo.img)
          # committed to this repo already. Checked before the (very long,
          # per OrangeFox's own README) sync below so a missing blob fails
          # in seconds, not an hour-plus.
          test -f device-tree-src/device/motorola/kansas/prebuilt/Image.lz4 || \
            { echo "::error::Missing device/motorola/kansas/prebuilt/Image.lz4 — extract it from boot_a with unpack_bootimg.py and commit it before building."; exit 1; }

      - name: Fetch OrangeFox sync tool
        run: |
          git clone --depth=1 https://gitlab.com/OrangeFox/sync.git ~/OrangeFox_sync

      - name: Sync and patch the OrangeFox fox_14.1 build system
        run: |
          cd ~/OrangeFox_sync
          ./orangefox_sync.sh --branch "${{ github.event.inputs.fox_branch || '14.1' }}" --path "$HOME/fox_14.1"
          df -h / /mnt

      - name: Place device tree
        run: |
          rm -rf "$HOME/fox_14.1/device/motorola/kansas"
          mkdir -p "$HOME/fox_14.1/device/motorola"
          cp -r device-tree-src/device/motorola/kansas "$HOME/fox_14.1/device/motorola/kansas"

      - name: Set up ccache
        run: |
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kansas-fox-${{ github.sha }}
          restore-keys: |
            ccache-kansas-fox-

      - name: Build recovery
        working-directory: /home/runner/fox_14.1
        run: |
          set -e
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_kansas-ap2a-eng

          # Runs 9-11 all died a few minutes into this step from memory
          # pressure during Soong's whole-tree analysis; 24G swap + masking
          # systemd-oomd (above) got run 13 past that and ~9 minutes into
          # the step - real progress - but it then died anyway, and this
          # time badly enough that even the job log was lost (BlobNotFound),
          # not just cut off. That's a harder crash than the earlier
          # systemd-oomd kills, consistent with genuinely running out of
          # RAM+swap during actual compilation, where multiple parallel
          # cc1plus/clang processes each hold significant memory - not just
          # Soong's one-time analysis spike. -j(nproc-1) is still too many
          # concurrent compiles for this runner's memory budget, so cap
          # parallelism hard instead of scaling it off core count, and give
          # more swap headroom. If this still isn't enough, the runner
          # doesn't have enough RAM for this build regardless of tuning and
          # a larger-memory runner is the real fix.
          build_jobs=2
          df -h / /mnt
          ( while true; do sleep 60; echo "::notice::still building ($(date -u +%H:%M:%S) UTC)"; done ) &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null' EXIT

          # Run 15 (disk fix in place) got to 99% (5293/5296) and then
          # failed: "rsync: [sender] link_stat
          # ".../out/target/product/kansas/root" failed: No such file or
          # directory". Read core/Makefile from the exact build/make tag
          # this fox_14.1/minimal-manifest tree pins
          # (android-14.0.0_r67): the recovery-ramdisk-packaging rule
          # (ramdisk_files-timestamp, core/Makefile:2694) rsyncs FROM
          # $(TARGET_ROOT_OUT) (.../root) as its baseline, and depends
          # directly on $(INTERNAL_ROOT_FILES) - the individual files
          # destined for that directory - not on installed-files-root.txt
          # or systemimage at all.
          #
          # Run 16 tried requesting installed-files-root.txt as a raw
          # extra mka goal - ninja rejected it ("ninja: unknown target").
          #
          # Run 17 tried "systemimage" instead, on the theory that
          # FULL_SYSTEMIMAGE_DEPS (which does include
          # INSTALLED_FILES_FILE_ROOT) would pull root population in as a
          # side effect. Confirmed a dead end: kansas's BoardConfig.mk/
          # device.mk never sets PRODUCT_BUILD_SYSTEM_IMAGE,
          # PRODUCT_USE_DYNAMIC_PARTITION_SIZE, or
          # BOARD_SYSTEMIMAGE_PARTITION_SIZE, so core/board_config.mk
          # clears BUILDING_SYSTEM_IMAGE to empty, and "systemimage"
          # resolves to the empty stub phony at core/Makefile:939 - not
          # the real target (core/Makefile:3529, only added inside
          # `ifdef BUILDING_SYSTEM_IMAGE`). Requesting it added zero new
          # ninja work: same 5293/5296 failure point, installed-files-
          # root.txt never appears as a build step in the log either way.
          #
          # The actual fix is in the device tree, not here:
          # device/motorola/kansas/device.mk now inherits
          # target/product/generic_ramdisk.mk, which adds
          # init_first_stage to PRODUCT_PACKAGES - that's what actually
          # populates $(TARGET_ROOT_OUT) in modern (system-as-root/GKI)
          # AOSP, without pulling in a full system image build.
          # fs_config_files_system/fs_config_dirs_system (added to
          # PRODUCT_PACKAGES in device.mk, see its comment for why) have
          # no formal Makefile dependency edge pulling them in ahead of
          # recovery_ramdisk's mkbootfs -d $(TARGET_OUT) call, which is
          # what actually reads their generated output at runtime to fix
          # /sbin/* permissions. Request them explicitly in the same mka
          # invocation so ninja builds them - recovery_ramdisk is one of
          # the very last steps in this build (5293+/5296 in prior runs),
          # and these are small standalone leaf modules, so in practice
          # they finish well before mkbootfs runs even without a real
          # graph edge.
          mka fs_config_files_system fs_config_dirs_system ${{ github.event.inputs.build_target || 'bootimage' }} -j"$build_jobs"

      # Run 25 failed inside OrangeFox_A14.sh's "Fox_Before_Recovery_Image"
      # step with a cascade of "No such file or directory" under
      # recovery/root/system/ (magiskboot symlink, bash.bashrc, and
      # fatally system/etc/recovery.fstab) - pointing at recovery/root/system
      # never getting populated with real content before that script runs.
      # The runner is torn down the instant the job fails, so there's no way
      # to inspect out/ post-mortem - dump the exact state of root/,
      # recovery/root/, and system/ (TARGET_OUT) here, on failure, so the
      # next run's log has real data instead of another guess.
      - name: Diagnose recovery root population on failure
        if: failure()
        working-directory: /home/runner/fox_14.1
        run: |
          echo "::group::out/target/product/kansas/root"
          find out/target/product/kansas/root -maxdepth 4 2>&1 || echo "(root/ does not exist)"
          echo "::endgroup::"
          echo "::group::out/target/product/kansas/system (TARGET_OUT)"
          find out/target/product/kansas/system -maxdepth 3 2>&1 || echo "(system/ does not exist)"
          echo "::endgroup::"
          echo "::group::out/target/product/kansas/recovery/root"
          find out/target/product/kansas/recovery/root -maxdepth 4 2>&1 || echo "(recovery/root/ does not exist)"
          echo "::endgroup::"

      - name: Collect output artifact
        working-directory: /home/runner/fox_14.1
        run: |
          mkdir -p /home/runner/out-artifact
          # boot.img is the one that actually carries the recovery ramdisk
          # on this device again (BOARD_USES_RECOVERY_AS_BOOT=true — a
          # vendor_boot detour proved unflashable on real hardware, see
          # BoardConfig.mk's boot image section for the full history).
          # vendor_boot.img/init_boot.img/recovery.img/OrangeFox's
          # flashable *.zip are collected too in case that changes again.
          find out/target/product/kansas -maxdepth 1 \
            \( -name "boot.img" -o -name "vendor_boot.img" -o -name "init_boot.img" -o -name "recovery.img" -o -name "*.zip" \) \
            -exec cp {} /home/runner/out-artifact/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kansas-orangefox-${{ github.run_number }}
          path: /home/runner/out-artifact/*
          if-no-files-found: error
          retention-days: 14
